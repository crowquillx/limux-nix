name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: ./.github/actions/nix-setup
        with:
          cachix-name: crowquillx
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        run: nix flake check --print-build-logs

      - name: Build package
        run: nix build .#limux --print-build-logs

      - name: Smoke test
        run: |
          test -x ./result/bin/limux
          ./result/bin/limux -h | head -1

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: limux-x86_64-linux
          path: result/
          if-no-files-found: error
