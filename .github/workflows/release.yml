name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Package version to release (e.g. 0.1.19)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Nix
        uses: ./.github/actions/nix-setup
        with:
          cachix-name: crowquillx
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${GITHUB_REF_NAME}" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "Could not determine version" >&2
            exit 1
          fi

      - name: Build package
        run: nix build .#limux --print-build-logs

      - name: Create release tarball
        run: |
          version="${{ steps.version.outputs.value }}"
          archive="limux-${version}-x86_64-linux-nix.tar.gz"
          tar -czf "$archive" -C result .
          echo "archive=$archive" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: limux v${{ steps.version.outputs.value }} (Nix)
          body: |
            Nix-built [Limux](https://github.com/am-will/limux) v${{ steps.version.outputs.value }} for x86_64-linux.

            Extract and add `bin/` to your `PATH`, or prefer installing via flake:

            ```bash
            nix profile install github:crowquillx/limux-nix
            ```
          files: ${{ env.archive }}
          generate_release_notes: true
