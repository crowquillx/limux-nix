name: Update upstream

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: ./.github/actions/nix-setup
        with:
          cachix-name: crowquillx
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update limux package
        uses: winapps-org/nix-update-action@v1.3.0
        with:
          packages: limux
          pr-title: "chore: update limux to latest upstream release"
          pr-labels: |
            automated
            dependencies
          extra-args: --build
